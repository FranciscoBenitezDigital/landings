<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código QR - Formulario Prompts IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #081225 0%, #0B1E3A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }
        
        h1 {
            color: #C0F0F8;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .subtitle {
            color: rgba(192, 240, 248, 0.8);
            font-size: 16px;
            margin-bottom: 40px;
        }
        
        .qr-wrapper {
            background: white;
            padding: 20px;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 32px;
            box-shadow: 0 4px 12px rgba(32, 144, 248, 0.2);
        }
        
        #qrcode {
            display: inline-block;
        }
        
        .url-display {
            background: rgba(32, 144, 248, 0.1);
            border: 1px solid rgba(32, 144, 248, 0.3);
            border-radius: 8px;
            padding: 16px;
            color: #C0F0F8;
            font-size: 14px;
            word-break: break-all;
            margin-bottom: 24px;
        }
        
        .download-btn {
            background: linear-gradient(135deg, #2090F8 0%, #1a75d8 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(32, 144, 248, 0.3);
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(32, 144, 248, 0.4);
        }
        
        .info {
            color: rgba(192, 240, 248, 0.6);
            font-size: 13px;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Código QR</h1>
        <p class="subtitle">Escanea para acceder al formulario</p>
        
        <div class="qr-wrapper">
            <div id="qrcode"></div>
        </div>
        
        <div class="url-display">
            https://franciscobenitezdigital.github.io/landings/formulario-prompts-hotmart/
        </div>
        
        <button class="download-btn" onclick="downloadQR()">
            Descargar QR Code
        </button>
        
        <p class="info">
            El código QR te llevará directamente al formulario de captura de leads
        </p>
    </div>

    <!-- QRCode.js library from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script>
        // URL del formulario en GitHub Pages
        const formUrl = 'https://franciscobenitezdigital.github.io/landings/formulario-prompts-hotmart/';
        
        // Generar el código QR
        const qrcode = new QRCode(document.getElementById('qrcode'), {
            text: formUrl,
            width: 256,
            height: 256,
            colorDark: '#081225',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });
        
        // Función para descargar el QR code como imagen
        function downloadQR() {
            // Esperar a que el QR se genere completamente
            setTimeout(() => {
                const canvas = document.querySelector('#qrcode canvas');
                if (canvas) {
                    // Convertir el canvas a blob
                    canvas.toBlob(function(blob) {
                        // Crear un enlace de descarga
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = 'qr-formulario-prompts-hotmart.png';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(url);
                    });
                } else {
                    alert('Error al generar el código QR. Por favor, recarga la página.');
                }
            }, 100);
        }
    </script>
</body>
</html>
